---
# decentralized-deploy/akash-vllm.yaml
# Akash SDL example for deploying a sharded vLLM pod
# Model: Qwen2.5-Coder-32B-Instruct (or swap for your preferred model)
# Requires: Akash CLI + wallet with AKT

version: "2.0"

services:
  vllm:
    image: vllm/vllm-openai:latest
    env:
      - NVIDIA_VISIBLE_DEVICES=all
    command:
      - --model
      - Qwen/Qwen2.5-Coder-32B-Instruct
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.85"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    expose:
      - port: 8000
        as: 8000
        to:
          - global: true
    params:
      storage:
        mount: /models

profiles:
  compute:
    vllm:
      resources:
        cpu:
          units: 8
        memory:
          size: 32Gi
        storage:
          size: 100Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: rtx4090
                  ram: 24Gi
  placement:
    westcoast:
      attributes:
        region: us-west
      signedBy:
        anyOf:
          - "akash1..."
      pricing:
        vllm:
          denom: uakt
          amount: 1000

deployment:
  vllm:
    vllm:
      profile: vllm
      count: 1
# nginx/vllm-orchestrator.conf
# Production-ready reverse proxy for sharded vLLM backends
# Uses dynamic upstream from manage_endpoints.sh

include /etc/nginx/conf.d/upstream_vllm.conf;

server {
    listen 80;
    server_name _;

    # Increase timeouts for long-running inference
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Important headers for vLLM / OpenAI compatible APIs
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Disable buffering for streaming responses (important for token streaming)
    proxy_buffering off;
    proxy_request_buffering off;

    # === Basic Authentication (commented by default) ===
    # To enable:
    # 1. Create a password file: htpasswd -c /etc/nginx/.htpasswd orchestrator
    # 2. Uncomment the two lines below
    # 3. Reload Nginx: nginx -t && systemctl reload nginx
    #
    # auth_basic "Restricted Access";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # === Rate Limiting (basic example - adjust as needed) ===
    limit_req_zone $binary_remote_addr zone=one:10m rate=20r/s;

    location / {
        limit_req zone=one burst=30 nodelay;
        proxy_pass http://vllm_backends;
    }

    # Health check endpoint (useful for load balancers / monitoring)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Optional: More aggressive rate limiting on /v1/ endpoint
    # location /v1/ {
    #     limit_req zone=one burst=10 nodelay;
    #     proxy_pass http://vllm_backends;
    # }
}